name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild -p android --no-install --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/gibor-keari-debug.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gibor-keari-debug-apk
          path: dist/gibor-keari-debug.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gibor-keari-debug.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Publish APK to rolling "latest" release (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest debug build
          body: |
            Auto-built debug APK.
            Open this page on your Android phone and tap the .apk to install.
            (You may need to allow "install from unknown sources" the first time.)
          files: dist/gibor-keari-debug.apk
          fail_on_unmatched_files: true
          make_latest: 'true'
