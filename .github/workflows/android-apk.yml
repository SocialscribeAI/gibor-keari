name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Stamp build info
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT="${GITHUB_SHA::7}"
          cat > src/buildInfo.ts <<EOF
          // Auto-generated by CI. Do NOT edit by hand.
          export const BUILD_TIME_ISO = '${BUILD_TIME}';
          export const BUILD_COMMIT = '${COMMIT}';
          EOF
          cat src/buildInfo.ts

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild -p android --no-install --clean

      - name: Pin androidx.core to AGP-compatible version
        run: |
          cat >> android/app/build.gradle <<'EOF'

          // CI patch: AGP 8.6 cannot consume androidx.core 1.17 (needs AGP 8.9+).
          // Force the latest version compatible with AGP 8.6.
          configurations.all {
              resolutionStrategy {
                  force 'androidx.core:core:1.13.1'
                  force 'androidx.core:core-ktx:1.13.1'
              }
          }
          EOF

      - name: Generate alpha signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/alpha.keystore \
            -alias alpha \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass alphaalpha -keypass alphaalpha \
            -dname "CN=GiborKeAriAlpha, OU=Dev, O=GiborKeAri, L=NA, S=NA, C=IL"

      - name: Configure release signing
        run: |
          python3 <<'PY'
          import re, pathlib
          p = pathlib.Path('android/app/build.gradle')
          s = p.read_text()
          signing_block = (
              "        release {\n"
              "            storeFile file('alpha.keystore')\n"
              "            storePassword 'alphaalpha'\n"
              "            keyAlias 'alpha'\n"
              "            keyPassword 'alphaalpha'\n"
              "        }\n"
          )
          # Add release signingConfig after the debug one
          s2 = re.sub(
              r"(signingConfigs\s*\{[\s\S]*?debug\s*\{[\s\S]*?\}\s*)",
              lambda m: m.group(1) + signing_block,
              s, count=1)
          # Point release buildType to signingConfigs.release
          s3 = re.sub(
              r"(buildTypes\s*\{[\s\S]*?release\s*\{[\s\S]*?signingConfig\s+signingConfigs\.)debug",
              r"\1release",
              s2, count=1)
          p.write_text(s3)
          print("== signingConfigs / buildTypes excerpt ==")
          idx = s3.find('signingConfigs')
          print(s3[idx:idx+1200])
          PY

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -x :react-native-worklets:assertMinimalReactNativeVersionTask

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/gibor-keari.apk
          ls -lh dist/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gibor-keari-apk
          path: dist/gibor-keari.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gibor-keari.apk
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Publish APK to rolling "latest" release (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Auto-built release APK (alpha-signed).
            Open this page on your Android phone and tap the .apk to install.
            (Allow "install from unknown sources" the first time.)
          files: dist/gibor-keari.apk
          fail_on_unmatched_files: true
          make_latest: 'true'
